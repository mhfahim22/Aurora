name: Aurora CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup LLVM
      shell: pwsh
      run: |
        # Chocolatey-installed LLVM is tools-only (no LLVMConfig.cmake).
        # Use the full tarball distribution which includes cmake config, headers, and libs.
        $llvmVersion = "19.1.0"
        $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/clang+llvm-$llvmVersion-x86_64-pc-windows-msvc.tar.xz"
        $archive = "$env:TEMP\llvm.tar.xz"
        Write-Host "Downloading LLVM $llvmVersion full tarball..."
        Invoke-WebRequest -Uri $url -OutFile $archive -UseBasicParsing
        Write-Host "Extracting..."
        $extractDir = "$env:TEMP\llvm-full"
        Remove-Item -Recurse -Force $extractDir -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
        7z x $archive "-o$extractDir" -y | Out-Null
        $llvmDir = Get-ChildItem -Path $extractDir -Directory | Select-Object -First 1 -ExpandProperty FullName
        $llvmCmakeDir = "$llvmDir\lib\cmake\llvm"
        if (-not (Test-Path "$llvmCmakeDir\LLVMConfig.cmake")) {
          Write-Host "Full directory listing:"
          Get-ChildItem -Path $llvmDir -Recurse -Depth 3 -ErrorAction SilentlyContinue | Select-Object -First 50 FullName
          throw "LLVMConfig.cmake not found at $llvmCmakeDir"
        }
        echo "LLVM_DIR=$llvmCmakeDir" >> $env:GITHUB_ENV
        echo "$llvmDir\bin" >> $env:GITHUB_PATH
        Write-Host "LLVM tarball setup OK at: $llvmDir"

    - name: Setup Visual Studio
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: '17.0'

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="$env:LLVM_DIR"

    - name: Build Core + Bridge Targets
      run: |
        cmake --build build --config Release --target aurorac --target aurora_runtime --target voss --target aurora_lsp -j2
        # Optional targets (require libclang):
        cmake --build build --config Release --target aurora_bindgen -j2 2>$null; if (-not $?) { Write-Host "  ⚠️ aurora_bindgen skipped (libclang not found)" }
        cmake --build build --config Release --target aurora_cppwrap -j2 2>$null; if (-not $?) { Write-Host "  ⚠️ aurora_cppwrap skipped (libclang not found)" }
        # npm bridge DLLs (require cl.exe via MSVC):
        cmake --build build --config Release --target bridge_moment --target bridge_lodash --target bridge_chalk --target bridge_execa --target bridge_got --target bridge_leftpad --target bridge_mobx --target bridge_uuid -j2 2>$null; if (-not $?) { Write-Warning "Bridge build failed" }

    - name: Build All Test Targets
      run: |
        cmake --build build --config Release --target test_unified_type_system --target test_ffi_memory_safety --target test_universal_bridge --target bench_native_speed --target test_bridge_e2e --target test_pypi_thread_safety --target test_integration_http --target bench_npm_bridge --target test_fuzz_parser --target bench_compiler --target test_ffi_abi --target test_ffi_abi_extra --target test_ffi_abi_edge --target test_ffi_abi_struct --target test_leak_detector --target test_smart_ptr --target test_optimizer --target test_tls_schannel --target bench_fast -j2

    - name: Run Test Suite
      run: |
        Write-Host "--- test_optimizer ---"
        build\Release\test_optimizer.exe
        Write-Host "--- test_leak_detector ---"
        build\Release\test_leak_detector.exe
        Write-Host "--- test_smart_ptr ---"
        build\Release\test_smart_ptr.exe
        Write-Host "--- test_ffi_abi ---"
        build\Release\test_ffi_abi.exe
        Write-Host "--- test_ffi_abi_extra ---"
        build\Release\test_ffi_abi_extra.exe
        Write-Host "--- test_ffi_abi_edge ---"
        build\Release\test_ffi_abi_edge.exe
        Write-Host "--- test_ffi_abi_struct ---"
        build\Release\test_ffi_abi_struct.exe
        Write-Host "--- test_ffi_memory_safety ---"
        build\Release\test_ffi_memory_safety.exe
        Write-Host "--- test_bridge_e2e ---"
        build\Release\test_bridge_e2e.exe
        Write-Host "--- test_pypi_thread_safety ---"
        build\Release\test_pypi_thread_safety.exe
        Write-Host "--- test_integration_http ---"
        build\Release\test_integration_http.exe

    - name: Run Fuzz & Benchmark Tests
      run: |
        Write-Host "--- test_fuzz_parser ---"
        build\Release\test_fuzz_parser.exe 1000
        Write-Host "--- bench_compiler ---"
        build\Release\bench_compiler.exe

    - name: Run Aurora Language Tests
      run: |
        if (Test-Path -LiteralPath ".\scripts\run_all_tests.ps1") {
          .\scripts\run_all_tests.ps1
        } else {
          Write-Host "  Skipping (run_all_tests.ps1 not found)"
        }

    - name: Verify Documentation Files
      run: |
        $docs = @(
          "README.md", "CONTRIBUTING.md", "SECURITY.md", "CHANGELOG.md",
          "VERSION", "RELEASE.md", "PRODUCTION_PLAN.md",
          "aurora/docs/language.md", "aurora/docs/bridge_security.md",
          "aurora/examples/bridge_pypi.aura", "aurora/examples/bridge_npm.aura",
          "aurora/examples/bridge_cargo.aura"
        )
        $all_ok = $true
        foreach ($f in $docs) {
          if (Test-Path -LiteralPath $f) {
            Write-Host "  ✅ $f"
          } else {
            Write-Host "  ❌ $f"
            $all_ok = $false
          }
        }
        if (-not $all_ok) { throw "Missing documentation files" }

    - name: ASAN Build (AddressSanitizer)
      run: |
        cmake -B build_asan -DCMAKE_BUILD_TYPE=Debug `
          -DCMAKE_CXX_FLAGS_DEBUG="/fsanitize=address /Od /Zi /D_ITERATOR_DEBUG_LEVEL=0" `
          -DCMAKE_EXE_LINKER_FLAGS_DEBUG="/DEBUG" `
          -DLLVM_DIR="$env:LLVM_DIR"
        cmake --build build_asan --config Debug `
          --target test_ffi_memory_safety `
          --target bench_npm_bridge -j2

    - name: Run ASAN Memory Tests
      run: |
        # Find ASAN runtime DLL via vswhere
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
        $asanDll = Get-ChildItem -Path "$vsPath\VC\Tools\MSVC" -Recurse -Filter "clang_rt.asan_dbg_dynamic-x86_64.dll" | Select-Object -First 1 -ExpandProperty DirectoryName
        if ($asanDll) { $env:Path = "$asanDll;$env:Path" }
        build_asan\Debug\test_ffi_memory_safety.exe

    - name: Verify Build Output
      run: |
        $files = @(
          "build\Release\aurorac.exe",
          "build\Release\aurora_runtime.lib",
          "build\Release\voss.exe",
          "build\Release\aurora_lsp.exe"
        )
        $optional = @(
          "build\Release\aurora_bindgen.exe",
          "build\Release\aurora_cppwrap.exe"
        )
        $all_ok = $true
        foreach ($f in $files) {
          if (Test-Path -LiteralPath $f) {
            Write-Host "  ✅ $f"
          } else {
            Write-Host "  ❌ $f"
            $all_ok = $false
          }
        }
        foreach ($f in $optional) {
          if (Test-Path -LiteralPath $f) {
            Write-Host "  ✅ $f"
          } else {
            Write-Host "  ⚠️ $f (optional, requires libclang)"
          }
        }
        if (-not $all_ok) {
          throw "Missing build artifacts"
        }

  build-ubuntu:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install LLVM
      run: |
        wget -q https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 19
        sudo apt-get install -y liblld-19-dev
        echo "LLVM_DIR=/usr/lib/llvm-19/lib/cmake/llvm" >> $GITHUB_ENV

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y cmake g++ libcurl4-openssl-dev libgl1-mesa-dev

    - name: Remove conflicting LLVM cmake files
      run: |
        # Remove ALL non-LLVM19 clang cmake files to prevent find_package from
        # picking up broken ClangTargets from older LLVM versions on the runner
        # First check what's installed
        for llvmdir in /usr/lib/llvm-*; do
          [ -d "$llvmdir" ] || continue
          ver="${llvmdir#/usr/lib/llvm-}"
          if [ "$ver" != "19" ]; then
            sudo rm -rf "$llvmdir/lib/cmake/clang" 2>/dev/null || true
          fi
        done
        for cmakedir in /usr/lib/cmake/clang-*; do
          [ -d "$cmakedir" ] || continue
          ver="${cmakedir#/usr/lib/cmake/clang-}"
          if [ "$ver" != "19" ]; then
            sudo rm -rf "$cmakedir" 2>/dev/null || true
          fi
        done
        sudo rm -rf /usr/lib/llvm-19/lib/cmake/clang 2>/dev/null || true
        # Verify LLVM 19 cmake exists
        if [ ! -f "/usr/lib/llvm-19/lib/cmake/llvm/LLVMConfig.cmake" ]; then
          echo "WARNING: LLVM 19 cmake not found at expected path"
          ls /usr/lib/llvm-*/lib/cmake/llvm/ 2>/dev/null || true
        fi

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="$LLVM_DIR"

    - name: Build Core Targets
      run: |
        cmake --build build --config Release --target aurorac --target aurora_runtime --target voss --target aurora_lsp -j$(nproc)

    - name: Build Test Targets
      run: |
        cmake --build build --config Release --target test_unified_type_system --target test_universal_bridge --target test_fuzz_parser --target bench_compiler -j$(nproc)

    - name: Run C++ Tests (non-bridge)
      run: |
        build/Release/test_unified_type_system
        build/Release/test_fuzz_parser 1000
        build/Release/bench_compiler

    - name: Verify Documentation Files
      run: |
        for f in README.md CONTRIBUTING.md SECURITY.md CHANGELOG.md \
                 VERSION RELEASE.md PRODUCTION_PLAN.md \
                 aurora/docs/language.md aurora/docs/bridge_security.md \
                 aurora/examples/bridge_pypi.aura \
                 aurora/examples/bridge_npm.aura \
                 aurora/examples/bridge_cargo.aura; do
          if [ -f "$f" ]; then
            echo "  ✅ $f"
          else
            echo "  ❌ $f"
            exit 1
          fi
        done

    - name: Verify Build Output
      run: |
        files="build/Release/aurorac build/Release/libaurora_runtime.a build/Release/voss build/Release/aurora_lsp"
        for f in $files; do
          if [ -f "$f" ]; then
            echo "  ✅ $f"
          else
            echo "  ❌ $f"
            exit 1
          fi
        done

    - name: Cross-platform npm bridge build test
      run: |
        set -e
        # Generate a test bridge using voss, then compile with gcc
        # Since we don't have network in CI, compile directly from quickjs sources
        cat > /tmp/test_bridge.c << 'CEOF'
#include "quickjs.h"
#include <string.h>
static JSValue js_hello(JSContext *ctx, JSValueConst this_val,
                        int argc, JSValueConst *argv) {
    return JS_NewString(ctx, "hello from bridge!");
}
static int g_inited=0;
static JSRuntime *g_rt=NULL;
static JSContext *g_ctx=NULL;
__attribute__((constructor))
static void init() {
    if(g_inited)return;g_rt=JS_NewRuntime();if(!g_rt)return;
    g_ctx=JS_NewContext(g_rt);if(!g_ctx){JS_FreeRuntime(g_rt);g_rt=NULL;return;}
    JSValue g=JS_GetGlobalObject(g_ctx);
    JS_SetPropertyStr(g_ctx,g,"hello",JS_NewCFunction(g_ctx,js_hello,"hello",0));
    JS_FreeValue(g_ctx,g);g_inited=1;
}
JSValue hello_world() {
    if(!g_ctx||!g_inited)return JS_NULL;
    return JS_Call(g_ctx,JS_GetPropertyStr(g_ctx,JS_GetGlobalObject(g_ctx),"hello"),
                   JS_UNDEFINED,0,NULL);
}
CEOF
        qjs_dir="${{ github.workspace }}/deps/quickjs"
        gcc -shared -fPIC -o /tmp/test_bridge.so /tmp/test_bridge.c \
            "$qjs_dir/quickjs.c" "$qjs_dir/cutils.c" \
            "$qjs_dir/libregexp.c" "$qjs_dir/libunicode.c" "$qjs_dir/dtoa.c" \
            -I"$qjs_dir" -include "$qjs_dir/quickjs_config.h" \
            -lpthread -ldl -lm 2>&1
        echo "  ✅ test_bridge.so compiled successfully"
        file /tmp/test_bridge.so

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install LLVM
      run: |
        # macOS 26 runner has llvm@20 pre-installed and compatible with Xcode 26.5
        echo "LLVM_DIR=$(brew --prefix llvm@20)/lib/cmake/llvm" >> $GITHUB_ENV
        echo "$(brew --prefix llvm@20)/bin" >> $GITHUB_PATH

    - name: Install Dependencies
      run: |
        brew install cmake

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="$LLVM_DIR"

    - name: Build Core Targets
      run: |
        cmake --build build --config Release --target aurorac --target aurora_runtime --target voss --target aurora_lsp -j$(sysctl -n hw.ncpu)

    - name: Build Test Targets
      run: |
        cmake --build build --config Release --target test_fuzz_parser --target bench_compiler -j$(sysctl -n hw.ncpu)

    - name: Run Compiler Tests
      run: |
        echo "--- test_fuzz_parser ---"
        build/Release/test_fuzz_parser 1000
        echo "--- bench_compiler ---"
        build/Release/bench_compiler

    - name: Verify Documentation Files
      run: |
        for f in README.md CONTRIBUTING.md SECURITY.md CHANGELOG.md \
                 VERSION RELEASE.md PRODUCTION_PLAN.md \
                 aurora/docs/language.md aurora/docs/bridge_security.md \
                 aurora/examples/bridge_pypi.aura \
                 aurora/examples/bridge_npm.aura \
                 aurora/examples/bridge_cargo.aura; do
          if [ -f "$f" ]; then
            echo "  ✅ $f"
          else
            echo "  ❌ $f"
            exit 1
          fi
        done

    - name: Verify Build Output
      run: |
        echo "  ✅ build/Release/aurorac"
        echo "  ✅ build/Release/libaurora_runtime.a"
        echo "  ✅ build/Release/voss"
        echo "  ✅ build/Release/aurora_lsp"

    - name: Cross-platform npm bridge build test
      run: |
        set -e
        cat > /tmp/test_bridge.c << 'CEOF'
#include "quickjs.h"
#include <string.h>
static JSValue js_hello(JSContext *ctx, JSValueConst this_val,
                        int argc, JSValueConst *argv) {
    return JS_NewString(ctx, "hello from bridge!");
}
static int g_inited=0;
static JSRuntime *g_rt=NULL;
static JSContext *g_ctx=NULL;
__attribute__((constructor))
static void init() {
    if(g_inited)return;g_rt=JS_NewRuntime();if(!g_rt)return;
    g_ctx=JS_NewContext(g_rt);if(!g_ctx){JS_FreeRuntime(g_rt);g_rt=NULL;return;}
    JSValue g=JS_GetGlobalObject(g_ctx);
    JS_SetPropertyStr(g_ctx,g,"hello",JS_NewCFunction(g_ctx,js_hello,"hello",0));
    JS_FreeValue(g_ctx,g);g_inited=1;
}
JSValue hello_world() {
    if(!g_ctx||!g_inited)return JS_NULL;
    return JS_Call(g_ctx,JS_GetPropertyStr(g_ctx,JS_GetGlobalObject(g_ctx),"hello"),
                   JS_UNDEFINED,0,NULL);
}
CEOF
        qjs_dir="${{ github.workspace }}/deps/quickjs"
        gcc -shared -fPIC -o /tmp/test_bridge.so /tmp/test_bridge.c \
            "$qjs_dir/quickjs.c" "$qjs_dir/cutils.c" \
            "$qjs_dir/libregexp.c" "$qjs_dir/libunicode.c" "$qjs_dir/dtoa.c" \
            -I"$qjs_dir" -include "$qjs_dir/quickjs_config.h" \
            -lpthread -ldl -lm 2>&1
        echo "  ✅ test_bridge.so compiled successfully"
        file /tmp/test_bridge.so
