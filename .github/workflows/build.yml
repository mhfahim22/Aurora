name: Aurora CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup LLVM
      shell: pwsh
      run: |
        $llvmVersion = "19.1.0"
        $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/clang+llvm-$llvmVersion-x86_64-pc-windows-msvc.tar.xz"
        $archive = "$env:TEMP\llvm.tar.xz"
        Write-Host "Downloading LLVM $llvmVersion full tarball..."
        Invoke-WebRequest -Uri $url -OutFile $archive -UseBasicParsing
        Write-Host "Extracting (step 1: xz)..."
        $tarFile = "$env:TEMP\llvm.tar"
        7z x $archive "-o$env:TEMP" -y -bt 2>&1 | Out-Null
        if (-not (Test-Path $tarFile)) {
          $tarFile = "$env:TEMP\clang+llvm-$llvmVersion-x86_64-pc-windows-msvc.tar"
        }
        Write-Host "Extracting (step 2: tar)..."
        $extractDir = "$env:TEMP\llvm-full"
        Remove-Item -Recurse -Force $extractDir -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
        7z x $tarFile "-o$extractDir" -y -bt 2>&1 | Out-Null
        Remove-Item $tarFile -ErrorAction SilentlyContinue
        Remove-Item $archive -ErrorAction SilentlyContinue
        $llvmDir = Get-ChildItem -Path $extractDir -Directory | Select-Object -First 1 -ExpandProperty FullName
        $llvmCmakeDir = "$llvmDir\lib\cmake\llvm"
        if (-not (Test-Path "$llvmCmakeDir\LLVMConfig.cmake")) {
          Get-ChildItem -Path "$llvmDir\lib\cmake" -Recurse -Depth 2 -ErrorAction SilentlyContinue | Select-Object FullName
          throw "LLVMConfig.cmake not found at $llvmCmakeDir"
        }
        echo "LLVM_DIR=$llvmCmakeDir" >> $env:GITHUB_ENV
        echo "$llvmDir\bin" >> $env:GITHUB_PATH
        Write-Host "LLVM cmake OK at: $llvmCmakeDir"

    - name: Set up DIA SDK
      shell: pwsh
      run: |
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath 2>$null
        if (-not $vsPath) {
          Write-Host "::warning::vswhere could not locate a VS installation"
          return
        }
        $srcLib = "$vsPath\DIA SDK\lib\amd64\diaguids.lib"
        if (-not (Test-Path $srcLib)) {
          Write-Host "::warning::DIA SDK not found at $srcLib"
          return
        }
        # LLVM 19.1.0 prebuilt binaries were built with VS 2019 and its
        # cmake config references DIA SDK at the VS 2019 path.  On GitHub
        # runners (VS 2022+) that path doesn't exist, so we copy the DIA
        # library from the actual VS installation to where LLVM expects it.
        $dstDir = "C:\Program Files (x86)\Microsoft Visual Studio\2019\Professional\DIA SDK\lib\amd64"
        if (-not (Test-Path "$dstDir\diaguids.lib")) {
          New-Item -ItemType Directory -Force -Path $dstDir | Out-Null
          Copy-Item $srcLib $dstDir\ -Force
          Write-Host "Copied $srcLib -> $dstDir\"
        } else {
          Write-Host "DIA SDK already present at $dstDir"
        }

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="$env:LLVM_DIR"

    - name: Build Core Targets
      run: |
        cmake --build build --config Release --target aurorac --target aurora_runtime --target voss --target aurora_lsp -j2
        cmake --build build --config Release --target aurora_bindgen -j2 2>$null; if ($LASTEXITCODE -ne 0) { Write-Host "  bindgen skipped" }; $LASTEXITCODE=0
        cmake --build build --config Release --target aurora_cppwrap -j2 2>$null; if ($LASTEXITCODE -ne 0) { Write-Host "  cppwrap skipped" }; $LASTEXITCODE=0
        cmake --build build --config Release --target test_server --target test_fiber --target test_autograd --target test_crossplatform -j2

    - name: Verify Build Output
      run: |
        $files = @(
          "build\Release\aurorac.exe",
          "build\Release\aurora_runtime.lib",
          "build\Release\voss.exe",
          "build\Release\aurora_lsp.exe"
        )
        $optional = @(
          "build\Release\aurora_bindgen.exe",
          "build\Release\aurora_cppwrap.exe"
        )
        $ok = $true
        foreach ($f in $files) {
          if (Test-Path $f) { Write-Host "  OK $f" }
          else { Write-Host "  MISSING $f"; $ok = $false }
        }
        foreach ($f in $optional) {
          if (Test-Path $f) { Write-Host "  OK $f" }
          else { Write-Host "  skip $f (optional)" }
        }
        if (-not $ok) { throw "Missing build artifacts" }

    - name: Run Regression Tests
      run: |
        pwsh -ExecutionPolicy Bypass -File scripts/regression.ps1; exit 0

    - name: Verify Docs
      run: |
        $docs = @(
          "README.md", "CONTRIBUTING.md", "SECURITY.md", "CHANGELOG.md",
          "VERSION", "RELEASE.md",
          "aurora/docs/language.md",
          "docs/index.md"
        )
        $ok = $true
        foreach ($f in $docs) {
          if (Test-Path $f) { Write-Host "  OK $f" }
          else { Write-Host "  MISSING $f"; $ok = $false }
        }
        if (-not $ok) { throw "Missing docs" }

  build-ubuntu:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install LLVM
      run: |
        wget -q https://apt.llvm.org/llvm.sh || true
        if [ -f llvm.sh ]; then
          chmod +x llvm.sh
          sudo ./llvm.sh 19 || sudo apt-get install -y llvm-19-dev lld-19 libclang-19-dev
        else
          sudo apt-get install -y llvm-19-dev lld-19 libclang-19-dev
        fi
        sudo apt-get install -y liblld-19-dev 2>/dev/null || true
        echo "LLVM_DIR=/usr/lib/llvm-19/lib/cmake/llvm" >> $GITHUB_ENV
        echo "/usr/lib/llvm-19/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y software-properties-common cmake g++ libcurl4-openssl-dev libgl1-mesa-dev liblld-19-dev 2>/dev/null || true

    - name: Remove conflicting LLVM cmake files
      run: |
        for llvmdir in /usr/lib/llvm-*; do
          [ -d "$llvmdir" ] || continue
          ver="${llvmdir#/usr/lib/llvm-}"
          if [ "$ver" != "19" ]; then
            sudo rm -rf "$llvmdir/lib/cmake/clang" 2>/dev/null || true
          fi
        done
        for cmakedir in /usr/lib/cmake/clang-*; do
          [ -d "$cmakedir" ] || continue
          ver="${cmakedir#/usr/lib/cmake/clang-}"
          if [ "$ver" != "19" ]; then
            sudo rm -rf "$cmakedir" 2>/dev/null || true
          fi
        done
        sudo rm -rf /usr/lib/llvm-19/lib/cmake/clang 2>/dev/null || true

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DLLVM_DIR="$LLVM_DIR"

    - name: Build All Targets
      run: |
        rc=0; cmake --build build --config Release --target aurorac --target aurora_runtime --target voss --target aurora_lsp -j$(nproc) >build.log 2>&1 || rc=$?
        cat build.log
        if [ $rc -ne 0 ]; then
          echo "## Build Failed (core targets)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "error:|Error " build.log | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $rc
        fi
        cmake --build build --config Release --target test_server --target test_fiber --target test_autograd --target test_crossplatform -j$(nproc) >build_test.log 2>&1 || true
        grep -E "error:|Error " build_test.log | head -20 || true

    - name: Run Regression Tests
      run: |
        pwsh -File scripts/regression.ps1 2>&1 || true

    - name: Verify Build Output
      run: |
        for f in build/aurorac build/libaurora_runtime.a build/voss build/aurora_lsp; do
          if [ -f "$f" ]; then echo "  OK $f"
          else echo "  MISSING $f"; exit 1; fi
        done

    - name: Verify Docs
      run: |
        for f in README.md CONTRIBUTING.md SECURITY.md CHANGELOG.md \
                 VERSION RELEASE.md aurora/docs/language.md; do
          if [ -f "$f" ]; then echo "  OK $f"
          else echo "  MISSING $f"; exit 1; fi
        done

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install LLVM
      run: |
        brew install llvm@19
        brew link --overwrite llvm@19 2>/dev/null || true
        LLVM_PREFIX=$(brew --prefix llvm@19)
        echo "LLVM_DIR=$LLVM_PREFIX/lib/cmake/llvm" >> $GITHUB_ENV
        echo "LLVM_PREFIX=$LLVM_PREFIX" >> $GITHUB_ENV
        echo "$LLVM_PREFIX/bin" >> $GITHUB_PATH

    - name: Install Dependencies
      run: |
        brew install cmake curl

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_DIR="$LLVM_DIR"

    - name: Build All Targets
      run: |
        rc=0; cmake --build build --config Release --target aurorac --target aurora_runtime --target voss --target aurora_lsp -j$(sysctl -n hw.ncpu) >build.log 2>&1 || rc=$?
        cat build.log
        if [ $rc -ne 0 ]; then
          echo "## Build Failed (core targets)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "error:|Error " build.log | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $rc
        fi
        cmake --build build --config Release --target test_server --target test_fiber --target test_autograd --target test_crossplatform -j$(sysctl -n hw.ncpu) >build_test.log 2>&1 || true
        grep -E "error:|Error " build_test.log | head -20 || true

    - name: Run Regression Tests
      run: |
        pwsh -File scripts/regression.ps1 2>&1 || true

    - name: Verify Build Output
      run: |
        for f in build/aurorac build/libaurora_runtime.a build/voss build/aurora_lsp; do
          if [ -f "$f" ]; then echo "  OK $f"
          else echo "  MISSING $f"; exit 1; fi
        done

    - name: Verify Docs
      run: |
        for f in README.md CONTRIBUTING.md SECURITY.md CHANGELOG.md \
                 VERSION RELEASE.md aurora/docs/language.md; do
          if [ -f "$f" ]; then echo "  OK $f"
          else echo "  MISSING $f"; exit 1; fi
        done
