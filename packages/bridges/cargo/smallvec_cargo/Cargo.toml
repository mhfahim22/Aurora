[package]
name = "smallvec_bridge"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
serde = "1"
serde_json = "1"
futures = "0.3"
smallvec = { version = "1.15.1", features = ["const_generics", "const_new", "drain_filter", "drain_keep_rest", "impl_bincode", "union", "write"] }
