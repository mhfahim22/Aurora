[package]
name = "serde_json_bridge"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
serde = "1"
futures = "0.3"
serde_json = { version = "1.0.150", features = ["alloc", "arbitrary_precision", "float_roundtrip", "preserve_order", "raw_value", "std", "unbounded_depth"] }
